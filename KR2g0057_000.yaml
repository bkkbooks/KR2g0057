body:
  text: 西使記傳記𩔖四雜録之屬提要臣等謹案西使記一卷元劉郁撰郁真定人是書記常徳西使皇弟錫里庫軍中往返道途之所見王惲嘗載入玉堂雜記中此本别行之本也元史憲宗紀二年壬子秋遣錫喇征西域蘇丹諸國是嵗錫喇薨三年癸丑夏六月命諸王錫里庫及烏蘭哈達帥師征西域法勒噶巴哈台等國八年戊午錫里庫討囘囘法勒噶平之擒其王遣使來獻捷考世系表睿宗十一子次六曰錫里庫而諸王中别無錫喇郭侃傳侃壬子從錫里庫西征與此記所云壬子嵗皇弟錫喇統諸軍奉詔西征凡六年拓境幾萬里者相合然則錫喇即錫里庫因元史為明代所修故譯音訛舛一以為錫喇一以為錫里庫誤分二人而憲宗紀二年書錫喇薨三年重書錫里庫西征遂相承誤載也此記言常徳西使在己未正月葢錫里庫獻㨗之明年所記雖但據見聞不能考証古迹然亦時有異聞郭侃傳所載與此略同惟譯語時有訛異耳我皇上神武奮揚勘定西域崑崙月􅙡盡入版圖計常徳所經今皆在屯田列障之内業已欽定西域圖志昭示億齡郁所記録本不足道然據其所述亦足㕘稽道里考証古今之異同故仍録而存之焉乾隆四十六年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:2f4415bd79965c17bea86a4e5eb3cb7597309b2d242181da049ea3ca335ea59e
