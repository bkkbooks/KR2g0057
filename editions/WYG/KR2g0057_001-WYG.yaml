body:
  text: 西使記元劉郁撰壬子嵗皇弟錫喇統諸軍奉詔西征凡六年拓境幾萬里己未正月甲子常德字仁卿馳驛西覲自和林出烏遜中西北行二百餘里地漸髙入站經瀚海地極髙寒雖酷暑雪不消山石皆松文西南七日過瀚海行三百里地漸下有河闊數里曰罕穆納夏漲以舟楫濟數日過龍骨河復西北行與巴實伯里南北相直近五百里多漢民有二麥黍榖河西注瀦為海約千餘里曰赫色勒巴實多魚可食有碾磑亦以水激之行漸西有城曰伊瑪又西南行過博囉城所種皆麥稻山多柏不能株絡石而長城居肆囿間錯土屋牕户皆琉璃城北有海鐵山風出往往吹行人墮海中西南行二十里有闗曰特穆爾徹辰守闗者皆漢民闗徑﨑嶇似棧道出闗至阿里瑪圖城市井皆流水交貫有諸果唯瓜蒲萄石榴最佳囘紇與漢民雜居其俗漸染頗似中國又南有齊黙克城居民多并汾人有獸似虎毛厚金色無文善傷人有蟲如蛛毒中人則煩渇飲水立死惟過醉蒲萄酒吐則解有㗜酒博囉城迤西金銀銅為錢有文而無孔方至瑪哈忠以馬撁拖床遞鋪負重而行疾或曰竒爾濟蘇易馬以犬二月二十四日過伊都兩山間土平民夥溝洫映帶多故壘壊垣問之葢契丹故居也計其地去和林萬五千里而近有河曰伊遜流洶洶東注土人云此黄河也二十八日過塔喇寺三月一日過薩蘭城有浮圖諸囘紇禮拜之所三日過丕實南諸囘紇貿易如上已節四日過呼展河渡船如弓鞋然土人云河源出南大山地多産玉疑為崑崙山以西多龜蛇行相雜郵亭客舍甃如浴室門户皆以琉璃飾之民賦嵗止輸金錢十文然貧富有差八日過塔實干城大而民繁時羣花正開唯梨花薔薇玫瑰如中國餘多不能名城之西所植皆蒲萄粳稻有麥亦秋種其地産藥十數種皆中國所無藥物療疾甚效曰阿哲爾狀如苦參治馬鼠瘡婦人損胎及打撲内損用豆許燕之自消曰阿錫爾狀如地骨皮治婦人産後衣不下又治金瘡膿不出嚼碎傅瘡上即出曰努格薩爾形似桔梗治金瘡及腸與筋斷者嚼碎傅之自續餘不能盡録十四日過安巴河夏不雨秋則雨溉田以水地多蝗有鳥飛食之十九日過琳沁城其地有桑棗征西鄂囉屯駐于此二十六日過瑪勒城又過諾爾桑城草皆苜蓿藩籬以柏二十九日過塔舒爾城滿山皆鹽如水晶狀近西南六七里新得國曰穆錫其牛皆駝峯黒色地無水土人隔山嶺鑿井相沿數十里下通流以溉田所屬山城三百五十已而皆下惟檐寒西一山城名竒塔卜孤峯峻絶不能矢石丙辰年王師至城下城絶髙險仰視之帽為墜諸道竝進敵大驚令相和卓納色爾來納欵已而烏爾古納蘇勒坦出降蘇勒坦猶國王也其父領兵别據山城令其子取之七日而陷金玉寶物甚多一帶有直銀千笏者其國兵皆刺客俗見男子勇壮者以利誘之令手刃父兄然後充兵醉酒扶入窟室娱以音樂美女縱其欲數日復置故處既醒問其所見教之能為刺客死則享福如此因授以經呪日誦葢使蠱其心志死無悔也令潜使末服之國必刺其主而後已雖婦人亦然其穆錫國在西域中最為􅇯悍威脅鄰國霸四十餘年王師既克誅之無遺𩔖四月六日過竒拉爾城所産蛇皆四跗長五尺餘首黒身黄皮如鯊魚口吐紫艷過阿勒鼎城密藏達爾人被髮率以紅帕勒首衣青如鬼然王師自入西域降者幾三十國有佛國名克實密爾西在印毒西北葢傳釋迦氏衣鉢者其人儀状甚古如世所繪達摩像不茹葷酒日啖粳一合所談皆佛法禪定至暮方語丁巳嵗取布達國南北二千里其王曰哈里巴其城有東西城中有大河西城無壁壘東城固之以甓繪其上甚盛王師至城下一交戰破勝兵四十餘萬西城陷皆盡屠其民尋圍東城六日而破死者以數十萬哈里巴以舸走獲焉其國俗富庶為西域冠宫殿皆以沉檀烏木降真為之壁皆以黒白玉為之金珠珍貝不可勝計其后妃皆漢人所産大珠曰太嵗彈蘭石瑟瑟金剛鑚之𩔖帶有直千金者其國六百餘年傳四十主至哈里巴而亡人物頗秀于諸國所産馬名托必察哈里巴不悦以橙漿和糖為飲琵琶三十六絃初哈里巴患頭痛醫不能治一伶人作新琵琶七十二絃聴之立解土人相傳布達諸國之祖故諸國皆臣服布達之西馬行二十日有天房内有天使神國之祖葬所也師名班巴爾其房中懸鐵絙以手捫之心誠可及不誠者竟不得捫經文甚多皆班巴爾所作轄大城數十其民富實西有密實勒國國尤富地産金人夜視有光處誌之以灰翌日發之有大如棗者至布達六千餘里國西即海海西有富浪國婦人衣冠如世所畫菩薩状男子僧服皆善寢不去衣雖夫婦亦異處有大鳥駝蹄蒼色鼓翅而行髙丈餘食火卵如升許其實喇斯國出珍珠其王名烏蘇阿都巴云西南海也採珠盛以革囊止露兩手腰絙石墜入海手取蚌并泥沙貯于囊中遇惡蟲以醋噀之即去既得蚌滿囊撼絙舟人引出之往往有死者印毒國去中國最近軍民一千二百萬户所出細藥大胡桃珠寶烏木雞舌賔鐵諸物國中懸大鐘有訴者撃之司鐘者紀其事及時王官亦紀其名以防姦欺民居以蒲為屋夏大熱人處水中己未年七月烏林國阿必鼎蘇勒坦來降城大小一百二十民一百七十萬山産銀黒契丹國名竒勒揚王名和達瑪鼎蘇勒坦聞王大賢亦來降其巴爾斯大城獅子雄者鬃尾如纓拂傷人吼則聲從腹中出馬聞之怖溺血狼有鬃孔雀如中國畫者惟尾在翅内每日中振羽香猫似土豹糞溺皆香如麝鸚鵡多五色風駝急使乗日可千里鵓鴿傳日亦千里珊瑚出西南海取以鐵網髙有至三尺者蘭赤生西南海山石中有五色鴨其價最髙金剛鑚出印毒以肉投大澗底飛鳥食其肉糞中得之薩巴爾出西海中葢蝳蝐之遺精蛟魚食之吐出年深結成價如金其假者即犀牛糞為之也骨篤犀大蛇之角也解諸毒龍種馬出西海中有鱗角牝馬有駒不敢同牧被引入海不復出皁鵰一産三卵内一卵生犬灰色而毛短隨母影而走所逐禽無不獲者壠種羊出西海以羊臍種土中溉以水聞雷而生臍系地中及長驚以木臍斷便行齧草至秋可食臍内復有種又一婦人解馬語即知吉凶甚騐其怪異等事不可殚紀往返凡一十四月郁歎曰西域之開始自張騫其土地山川固在也然世代浸逺國號變易事亦難考今之所謂瀚海者即古金山也印毒即漢身毒也曰駝鳥者即安息所産大馬爵也宻實勒即唐拂菻地也觀其土産風俗可知已又新唐書載拂菻去京師四萬里在西海上所産珍異之物與今日地里正同葢無疑也中統四年三月記西使記
